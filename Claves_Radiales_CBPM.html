    {id:"guardia",lb:"Guardia",ic:"🛡️",cl:"#606C38",ds:[

  var cuart = [["R-10","1ª Compañía"],["R-20","2ª Compañía"],["R-30","3ª Compañía"],["R-40","4ª Compañía"],["R-50","5ª Compañía"],["R-60","6ª Compañía"],["R-70","7ª Compañía"],["R-80","8ª Compañía"],["R-90","9ª Compañía"]];

  var activeCat = null;
  var showQ = false;

  // DOM refs
  var searchInput = document.getElementById("si");
  var searchClear = document.getElementById("sx");
  var chipsRow = document.getElementById("cr");
  var content = document.getElementById("ct");
  var backBar = document.getElementById("bb");
  var backBtn = document.getElementById("bk");
  var installBanner = document.getElementById("ib");
  var installText = document.getElementById("it");
  var installClose = document.getElementById("ic");

  function norm(str) {
    return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }

  function isSub(code) {
    return code.split("-").length > 2 || code.indexOf("G") !== -1;
  }

  function makeCard(code, desc, color, highlight) {
    var subClass = isSub(code) ? " s" : "";
    var hlClass = highlight ? " hl" : "";
    var borderStyle = highlight ? "border-color:" + color + "44;" : "";
    return '<div class="crd' + subClass + hlClass + '" style="' + borderStyle + '">' +
      '<span class="bdg" style="color:' + color + ';background:' + color + '18;">' + code + '</span>' +
      '<span class="dsc">' + desc + '</span></div>';
  }

  function render() {
    var query = norm(searchInput.value.trim());
    var isSearching = query.length > 0;

    // Clear button visibility
    searchClear.className = isSearching ? "srch-x vis" : "srch-x";

    // Back bar
    backBar.style.display = (!isSearching && activeCat) ? "" : "none";

    // Chips
    if (isSearching) {
      chipsRow.style.display = "none";
    } else {
      chipsRow.style.display = "-webkit-flex";
      chipsRow.style.display = "flex";
      var chipsHTML = "";
      for (var ci = 0; ci < cats.length; ci++) {
        var cat = cats[ci];
        var isActive = activeCat === cat.id;
        var chipColor = isActive ? cat.cl : "rgba(255,255,255,0.5)";
        var chipBorder = isActive ? cat.cl : "rgba(255,255,255,0.08)";
        var chipBg = isActive ? cat.cl + "22" : "rgba(255,255,255,0.03)";
        var chipOn = isActive ? " on" : "";
        chipsHTML += '<button class="chp' + chipOn + '" style="color:' + chipColor + ';border-color:' + chipBorder + ';background:' + chipBg + ';" data-id="' + cat.id + '">';
        chipsHTML += '<span class="chp-i">' + cat.ic + '</span>' + cat.lb + '</button>';
      }
      chipsRow.innerHTML = chipsHTML;
    }

    var html = "";

    // ===== SEARCH MODE =====
    if (isSearching) {
      var results = [];
      for (var si = 0; si < cats.length; si++) {
        var sCat = cats[si];
        for (var sj = 0; sj < sCat.ds.length; sj++) {
          var sItem = sCat.ds[sj];
          if (norm(sItem[0]).indexOf(query) !== -1 || norm(sItem[1]).indexOf(query) !== -1) {
            results.push({ code: sItem[0], desc: sItem[1], color: sCat.cl, label: sCat.lb, icon: sCat.ic });
          }
        }
      }
      for (var sk = 0; sk < cuart.length; sk++) {
        var qItem = cuart[sk];
        if (norm(qItem[0]).indexOf(query) !== -1 || norm(qItem[1]).indexOf(query) !== -1) {
          results.push({ code: qItem[0], desc: qItem[1], color: "#94A3B8", label: "Cuarteles", icon: "🏠" });
        }
      }

      html += '<div class="rl">' + results.length + " resultado" + (results.length !== 1 ? "s" : "") + "</div>";
      if (results.length === 0) {
        html += '<div class="emp"><div class="big">📻</div><p style="font-size:13px">No se encontraron claves</p><p style="font-size:11px;margin-top:4px;color:rgba(255,255,255,0.2)">Intenta con otro término</p></div>';
      } else {
        var lastLabel = "";
        for (var ri = 0; ri < results.length; ri++) {
          var rItem = results[ri];
          if (rItem.label !== lastLabel) {
            html += '<div class="rg" style="color:' + rItem.color + ';margin-top:' + (lastLabel ? "12px" : "0") + ';"><span>' + rItem.icon + '</span> ' + rItem.label + '</div>';
            lastLabel = rItem.label;
          }
          html += makeCard(rItem.code, rItem.desc, rItem.color, true);
        }
      }
      content.innerHTML = html;
      return;

    if (activeCat) {
      var aCat = null;
      for (var ai = 0; ai < cats.length; ai++) {
        if (cats[ai].id === activeCat) { aCat = cats[ai]; break; }
      }
      if (!aCat) return;
      html += '<div class="ach"><span class="ai">' + aCat.ic + '</span><h2 style="color:' + aCat.cl + '">' + aCat.lb + '</h2>';
      html += '<span class="ab" style="background:' + aCat.cl + '22;color:' + aCat.cl + '">' + aCat.ds.length + '</span></div>';
      for (var aj = 0; aj < aCat.ds.length; aj++) {
        html += makeCard(aCat.ds[aj][0], aCat.ds[aj][1], aCat.cl, false);
      }
      content.innerHTML = html;
      return;
    }

    // ===== HOME =====
    html += '<button class="qbtn' + (showQ ? " op" : "") + '" id="qb"><span>🏠 Cuarteles de Compañías</span><span class="qa">▼</span></button>';
    if (showQ) {
      html += '<div style="margin-bottom:14px">';
      for (var qi = 0; qi < cuart.length; qi++) {
        html += makeCard(cuart[qi][0], "Cuartel " + cuart[qi][1], "#94A3B8", false);
      }
      html += '</div>';
    }

    for (var hi = 0; hi < cats.length; hi++) {
      var hCat = cats[hi];
      html += '<div class="sec"><button class="sec-h" data-id="' + hCat.id + '">';
      html += '<span class="si">' + hCat.ic + '</span><h2 style="color:' + hCat.cl + '">' + hCat.lb + '</h2>';
      html += '<span class="ct" style="background:' + hCat.cl + '18;color:' + hCat.cl + '">' + hCat.ds.length + '</span>';
      html += '<span class="ar">Ver todo →</span></button>';
      var limit = Math.min(3, hCat.ds.length);
      for (var hj = 0; hj < limit; hj++) {
        html += makeCard(hCat.ds[hj][0], hCat.ds[hj][1], hCat.cl, false);
      }
      if (hCat.ds.length > 3) {
        html += '<button class="more" style="border-color:' + hCat.cl + '33;color:' + hCat.cl + ';" data-id="' + hCat.id + '">+ ' + (hCat.ds.length - 3) + ' claves más</button>';
      }
      html += '</div>';
    }

    content.innerHTML = html;
  }

  // ===== EVENT DELEGATION =====
  chipsRow.addEventListener("click", function(e) {
    var btn = e.target.closest(".chp");
    if (!btn) return;
    var id = btn.getAttribute("data-id");
    activeCat = (activeCat === id) ? null : id;
    render();
    window.scrollTo(0, 0);
  });

  content.addEventListener("click", function(e) {
    var secBtn = e.target.closest(".sec-h");
    var moreBtn = e.target.closest(".more");
    var qBtn = e.target.closest("#qb");

    if (secBtn) {
      activeCat = secBtn.getAttribute("data-id");
      render();
      window.scrollTo(0, 0);
    } else if (moreBtn) {
      activeCat = moreBtn.getAttribute("data-id");
      render();
      window.scrollTo(0, 0);
    } else if (qBtn) {
      showQ = !showQ;
      render();
    }
  });

  backBtn.addEventListener("click", function() {
    activeCat = null;
    render();
    window.scrollTo(0, 0);
  });

  searchInput.addEventListener("input", function() {
    activeCat = null;
    render();
  });

  searchClear.addEventListener("click", function() {
    searchInput.value = "";
    searchInput.focus();
    render();
  });

  // ===== INSTALL BANNER (iOS) =====
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isStandalone = (window.navigator.standalone === true);
  if (isIOS && !isStandalone) {
    installText.innerHTML = '<strong>Instalar como App:</strong> Toca <strong>Compartir</strong> (↑) y luego <strong>"Agregar a Inicio"</strong>';
    installBanner.className = "ibanner vis";
  }
  installClose.addEventListener("click", function() {
    installBanner.className = "ibanner";
  });

  // ===== INIT =====
  render();

})();
</script>
</body>
</html>
